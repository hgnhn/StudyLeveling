<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Nền tảng học tập</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .login-container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .login-container h2 { text-align: center; color: #1e3a8a; margin-bottom: 20px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #374151; font-weight: bold; }
        .form-group input, .form-group select {
            width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 4px;
        }
        
        .btn {
            width: 100%; padding: 10px; background-color: #2563eb; color: white;
            border: none; border-radius: 4px; font-size: 16px; cursor: pointer;
        }
        .btn:hover { background-color: #1d4ed8; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Đăng Nhập EduPlatform</h2>
    <form action="dashboard.html">
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Nhập email của bạn" required>
        </div>
        <div class="form-group">
            <label for="password">Mật khẩu:</label>
            <input type="password" id="password" placeholder="Nhập mật khẩu" required>
        </div>
        <div class="form-group">
            <label for="role">Bạn là:</label>
            <select id="role">
                <option value="student">Học sinh</option>
                <option value="teacher">Giáo viên</option>
            </select>
        </div>
        <button type="submit" class="btn">Đăng Nhập</button> 
    </form>
</div>

</body>
</html>
